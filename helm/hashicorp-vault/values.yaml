replicaCount: 2

image:
  repository: hashicorp/vault
  tag: "1.15.0"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

vault:
  server:
    ha:
      enabled: false

service:
  type: ClusterIP
  port: 8200

nodeSelector: {}
tolerations: []
affinity: {}
