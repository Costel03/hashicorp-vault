server:
  image:
    repository: hashicorp/vault
    tag: "1.16.1"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

  ha:
    enabled: false

  service:
    type: LoadBalancer
    port: 8200
    annotations:
      metallb.universe.tf/loadBalancerIPs: 192.168.56.22

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
    - host: vault.local
      paths:
      - /
    tls:
    - secretName: vault-tls
      hosts:
      - vault.local
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

  nodeSelector: {}
  tolerations: []
  affinity: {}

# Vault UI — accessible via LoadBalancer IP or Ingress
ui:
  enabled: true
  serviceType: ClusterIP

# Disable sidecar injector to save resources on a small cluster
injector:
  enabled: false
