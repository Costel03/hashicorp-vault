# TLS certificate for vault.local — used by the NGINX Ingress.
# Vault path: secret/tls/vault   keys: tls.crt  tls.key
#
# Generate self-signed cert in WSL:
#   openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /tmp/vault.key -out /tmp/vault.crt \
#     -subj "/CN=vault.local" \
#     -addext "subjectAltName=DNS:vault.local"
#   cat /tmp/vault.crt   → paste as tls.crt in Vault
#   cat /tmp/vault.key   → paste as tls.key in Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-tls
  namespace: hashicorp-vault
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-cluster-backend
    kind: ClusterSecretStore
  target:
    name: vault-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
  - secretKey: tls.crt
    remoteRef:
      key: tls/vault
      property: tls.crt
  - secretKey: tls.key
    remoteRef:
      key: tls/vault
      property: tls.key
